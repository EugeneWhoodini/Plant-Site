<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery Info</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Delivery Information</h1>

    <div class="top-menu">
      <a href="./index.html" class="profile-link">Home</a>
      <a href="cart.html" class="cart-link">Cart</a>
      <a href="account.html" class="profile-link">
        👤 <span id="user-display">Guest</span>
      </a>
    </div>
  </header>

  <main class="form-page">
    <h2>Enter Delivery Details</h2>

    <label>Full Name</label>
    <input type="text" id="delivery-name" placeholder="Insert appropriate info here">

    <label>Phone Number</label>
    <input type="text" id="delivery-phone" placeholder="Insert appropriate info here">

    <label>Email</label>
    <input type="email" id="delivery-email" placeholder="Insert appropriate info here">

    <label>Address</label>
    <input type="text" id="delivery-address" placeholder="Insert appropriate info here">

    <label>City</label>
    <input type="text" id="delivery-city" placeholder="Insert appropriate info here">

    <label>Postal Code</label>
    <input type="text" id="delivery-postal" placeholder="Insert appropriate info here">

    <button id="save-delivery">Continue to Payment</button>

    <p id="delivery-message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
