<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>User Profile</h1>

    <div class="top-menu">
      <a href="index.html" class="profile-link">Home</a>
      <a href="cart.html" class="cart-link">Cart</a>
    </div>
  </header>

  <main class="account-page">
    <section class="account-box">
      <h2>Sign Up</h2>

      <input type="text" id="signup-username" placeholder="Create username">
      <input type="password" id="signup-password" placeholder="Create password">

      <button id="signup-btn">Sign Up</button>
    </section>

    <section class="account-box">
      <h2>Sign In</h2>

      <input type="text" id="signin-username" placeholder="Username">
      <input type="password" id="signin-password" placeholder="Password">

      <button id="signin-btn">Sign In</button>
    </section>

    <p id="account-message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
